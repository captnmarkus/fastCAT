server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large TMX/CSV uploads (default is 1m -> HTTP 413).
    client_max_body_size 100m;

    # SPA (React/Vite) routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CAT API (MateCat-like) first (more specific prefix)
    location /api/cat/ {
        proxy_pass ${CAT_API_UPSTREAM};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # App agent chat API (cat-api)
    location /api/chat/ {
        proxy_pass ${CAT_API_UPSTREAM};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # App agent admin API (cat-api)
    location /api/admin/app-agent/ {
        proxy_pass ${CAT_API_UPSTREAM};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # LLM/NMT resource APIs (served by cat-api, but exposed at /api/*)
    location /api/nmt-providers {
        proxy_pass ${CAT_API_UPSTREAM};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/translation-engines {
        proxy_pass ${CAT_API_UPSTREAM};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # LLM gateway (OpenAI-style proxy)
    location /api/llm/ {
        proxy_pass ${LLM_GATEWAY_UPSTREAM};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # TM API (tm-proxy)
    location /api/ {
        proxy_pass ${TM_PROXY_UPSTREAM};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }
}
